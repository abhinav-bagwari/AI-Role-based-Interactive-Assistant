<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ARIA - AI-Run Intelligence Agency</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: {
                950: "#050A12",
                925: "#08111F",
                900: "#0B1628",
                850: "#102039",
              },
              cloud: {
                50: "#F6F2EB",
                100: "#E8E2D8",
                200: "#C8C0B4",
              },
              signal: {
                teal: "#3FE0C6",
                amber: "#FFB24A",
                coral: "#FF6F61",
                blue: "#6AB7FF",
                violet: "#8B7CFF",
                mint: "#7CFFB2",
              },
            },
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
              body: ["Manrope", "sans-serif"],
              mono: ["IBM Plex Mono", "monospace"],
            },
            boxShadow: {
              panel: "0 26px 80px rgba(0, 0, 0, 0.34)",
              glow: "0 0 0 1px rgba(63, 224, 198, 0.18), 0 18px 48px rgba(3, 12, 23, 0.4)",
            },
            animation: {
              "message-rise": "message-rise 0.45s cubic-bezier(0.19, 1, 0.22, 1)",
              "pulse-soft": "pulse-soft 2.4s ease-in-out infinite",
              "typing-dot": "typing-dot 1.2s ease-in-out infinite",
              "card-in": "card-in 0.24s ease-out",
            },
            keyframes: {
              "message-rise": {
                "0%": { opacity: "0", transform: "translateY(14px) scale(0.98)" },
                "100%": { opacity: "1", transform: "translateY(0) scale(1)" },
              },
              "pulse-soft": {
                "0%, 100%": { opacity: "0.5", transform: "scale(0.95)" },
                "50%": { opacity: "1", transform: "scale(1.05)" },
              },
              "typing-dot": {
                "0%, 80%, 100%": { opacity: "0.24", transform: "translateY(0px)" },
                "40%": { opacity: "1", transform: "translateY(-2px)" },
              },
              "card-in": {
                "0%": { opacity: "0", transform: "translateY(8px)" },
                "100%": { opacity: "1", transform: "translateY(0px)" },
              },
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <style>
      :root {
        color-scheme: dark;
        --ink-950: #050a12;
        --ink-925: #08111f;
        --ink-900: #0b1628;
        --cloud-50: #f6f2eb;
        --cloud-100: #e8e2d8;
        --cloud-200: #c8c0b4;
        --signal-teal: #3fe0c6;
        --signal-amber: #ffb24a;
        --signal-coral: #ff6f61;
        --signal-blue: #6ab7ff;
        --signal-violet: #8b7cff;
        --signal-mint: #7cffb2;
        --panel-bg: rgba(255, 255, 255, 0.04);
        --panel-soft-bg: rgba(255, 255, 255, 0.03);
        --border-soft: rgba(255, 255, 255, 0.1);
        --border-quiet: rgba(255, 255, 255, 0.08);
        --shadow-panel: 0 26px 80px rgba(0, 0, 0, 0.34);
        --shadow-glow: 0 0 0 1px rgba(63, 224, 198, 0.18), 0 18px 48px rgba(3, 12, 23, 0.4);
      }

      html,
      body,
      #app,
      .app-shell {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgba(63, 224, 198, 0.12), transparent 28rem),
          radial-gradient(circle at bottom right, rgba(255, 178, 74, 0.08), transparent 22rem),
          linear-gradient(180deg, rgba(10, 19, 33, 1), rgba(5, 10, 18, 1));
        color: var(--cloud-50);
        font-family: "Manrope", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      p,
      h1,
      h2,
      h3,
      h4,
      pre,
      ul {
        margin: 0;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        color: inherit;
      }

      textarea {
        resize: vertical;
      }

      .font-display {
        font-family: "Space Grotesk", "Manrope", sans-serif;
      }

      .font-mono {
        font-family: "IBM Plex Mono", monospace;
      }

      .text-cloud-50 {
        color: var(--cloud-50);
      }

      .text-cloud-100 {
        color: var(--cloud-100);
      }

      .text-signal-teal {
        color: var(--signal-teal);
      }

      .text-signal-amber {
        color: var(--signal-amber);
      }

      .text-signal-coral {
        color: var(--signal-coral);
      }

      .text-ink-950 {
        color: var(--ink-950);
      }

      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(106, 183, 255, 0.4) rgba(8, 17, 31, 0.8);
      }

      *::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      *::-webkit-scrollbar-track {
        background: rgba(8, 17, 31, 0.9);
      }

      *::-webkit-scrollbar-thumb {
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(63, 224, 198, 0.8), rgba(106, 183, 255, 0.66));
      }

      ::selection {
        background: rgba(63, 224, 198, 0.24);
        color: #ffffff;
      }

      .workspace-grid {
        display: grid;
        grid-template-columns: 272px minmax(0, 1fr);
        height: 100%;
        min-height: 0;
      }

      .workspace-sidebar {
        overflow-y: auto;
        border-right: 1px solid var(--border-quiet);
        background: rgba(6, 12, 22, 0.96);
        padding: 14px;
      }

      .workspace-main {
        display: flex;
        min-width: 0;
        min-height: 0;
        flex-direction: column;
      }

      .sidebar-stack {
        display: flex;
        height: 100%;
        flex-direction: column;
        gap: 12px;
      }

      .panel,
      .panel-soft,
      .room-panel,
      .composer-panel,
      .modal-card {
        border: 1px solid var(--border-soft);
        border-radius: 20px;
        background: var(--panel-bg);
        box-shadow: var(--shadow-panel);
        backdrop-filter: blur(18px);
      }

      .panel-soft {
        background: var(--panel-soft-bg);
      }

      .workspace-sidebar .panel,
      .workspace-sidebar .panel-soft,
      .composer-panel {
        padding: 16px;
      }

      .room-panel {
        display: flex;
        min-height: 0;
        flex: 1;
        flex-direction: column;
      }

      .room-panel,
      .composer-panel,
      .modal-card {
        overflow: hidden;
      }

      .brand-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        position: relative;
        display: flex;
        width: 44px;
        height: 44px;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(63, 224, 198, 0.18);
        border-radius: 16px;
        background: rgba(63, 224, 198, 0.08);
      }

      .brand-pulse {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--signal-teal);
        animation: pulse-soft 2.4s ease-in-out infinite;
      }

      .brand-mark::after {
        position: absolute;
        right: 8px;
        bottom: 8px;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--signal-amber);
        content: "";
      }

      .brand-copy {
        min-width: 0;
      }

      .brand-kicker {
        font-family: "Space Grotesk", "Manrope", sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--signal-teal);
      }

      .brand-title {
        margin-top: 4px;
        font-family: "Space Grotesk", "Manrope", sans-serif;
        font-size: 22px;
        font-weight: 600;
        line-height: 1.12;
        letter-spacing: -0.04em;
        color: var(--cloud-50);
      }

      .brand-body {
        margin-top: 12px;
        font-size: 13px;
        line-height: 1.58;
        color: rgba(232, 226, 216, 0.66);
      }

      .channel-panel {
        padding: 12px;
      }

      .channel-preview {
        margin-top: 3px;
        font-size: 11px;
        line-height: 1.42;
        color: rgba(232, 226, 216, 0.58);
      }

      .dm-section {
        margin-top: 20px;
      }

      .sidebar-section-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .sidebar-section-title {
        font-family: "Space Grotesk", "Manrope", sans-serif;
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(232, 226, 216, 0.52);
      }

      .dm-count {
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(232, 226, 216, 0.36);
      }

      .dm-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .topic-panel {
        margin-top: auto;
        overflow: hidden;
      }

      .topic-panel-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--border-soft);
        padding: 14px 16px;
      }

      .topic-panel-header h2 {
        font-family: "Space Grotesk", "Manrope", sans-serif;
        font-size: 22px;
        font-weight: 600;
        line-height: 1.14;
        letter-spacing: -0.03em;
      }

      .topic-panel-body {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 14px 16px;
      }

      .label-mono {
        font-family: "IBM Plex Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(232, 226, 216, 0.42);
      }

      .topic-copy {
        margin-top: 8px;
        font-size: 14px;
        line-height: 1.65;
        color: var(--cloud-50);
      }

      .topic-copy.muted {
        color: rgba(232, 226, 216, 0.76);
      }

      .room-header {
        position: sticky;
        top: 0;
        z-index: 18;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(8, 17, 31, 0.94);
        padding: 12px 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(18px);
      }

      .header-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .header-copy {
        min-width: 0;
        flex: 1;
      }

      .header-title-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
      }

      .room-title {
        font-family: "Space Grotesk", "Manrope", sans-serif;
        font-size: 27px;
        font-weight: 600;
        line-height: 1.08;
        letter-spacing: -0.04em;
        color: var(--cloud-50);
      }

      .header-description {
        margin-top: 6px;
        max-width: 52rem;
        font-size: 13px;
        line-height: 1.55;
        color: rgba(232, 226, 216, 0.64);
      }

      .header-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
      }

      .room-mode-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid;
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .mode-live {
        border-color: rgba(63, 224, 198, 0.2);
        background: rgba(63, 224, 198, 0.1);
        color: var(--signal-teal);
      }

      .mode-simulation {
        border-color: rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(232, 226, 216, 0.7);
      }

      .room-stack {
        display: flex;
        min-height: 0;
        flex: 1;
        flex-direction: column;
        gap: 10px;
        padding: 10px 18px 14px;
      }

      .room-panel-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--border-quiet);
        padding: 12px 16px;
      }

      .subheader-copy {
        min-width: 0;
      }

      .subheader-eyebrow {
        font-family: "Space Grotesk", "Manrope", sans-serif;
        font-size: 11px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: rgba(232, 226, 216, 0.48);
      }

      .subheader-body {
        margin-top: 4px;
        max-width: 48rem;
        font-size: 13px;
        line-height: 1.45;
        color: rgba(232, 226, 216, 0.66);
      }

      .avatar-strip {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .messages-scroll {
        min-height: 0;
        flex: 1;
        overflow-y: auto;
        padding: 14px 18px 18px;
      }

      .message-list {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .message-card {
        display: flex;
        justify-content: flex-start;
      }

      .message-card.owner {
        justify-content: flex-end;
      }

      .message-card.owner .message-shell {
        margin-left: 28px;
      }

      .message-card.agent .message-shell {
        margin-right: 28px;
      }

      .message-shell {
        width: 100%;
        max-width: min(980px, 100%);
      }

      .message-row {
        display: flex;
        gap: 12px;
      }

      .message-row.owner {
        flex-direction: row-reverse;
      }

      .message-avatar-rail {
        position: relative;
        width: 48px;
        flex-shrink: 0;
      }

      .thread-continuation {
        position: absolute;
        left: 20px;
        top: 0;
        width: 1px;
        height: 100%;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.08), transparent);
      }

      .message-stack {
        min-width: 0;
        flex: 1;
      }

      .message-meta {
        margin-bottom: 8px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .message-meta.owner {
        justify-content: flex-end;
      }

      .author-button {
        border: 0;
        background: transparent;
        padding: 0;
        color: var(--cloud-50);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .author-button:hover {
        color: var(--signal-teal);
      }

      .message-bubble {
        border: 1px solid var(--border-soft);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
        padding: 16px 18px;
      }

      .message-bubble.owner {
        border-color: rgba(63, 224, 198, 0.2);
        background: linear-gradient(135deg, rgba(63, 224, 198, 0.14), rgba(106, 183, 255, 0.1));
      }

      .message-content {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .rich-block {
        display: flex;
        flex-direction: column;
        gap: 8px;
        font-size: 15px;
        line-height: 1.78;
        color: rgba(246, 242, 235, 0.92);
      }

      .rich-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding-left: 20px;
      }

      .rich-list-item {
        font-size: 15px;
        line-height: 1.76;
        color: rgba(246, 242, 235, 0.92);
      }

      .decision-card {
        border: 1px solid rgba(255, 178, 74, 0.2);
        border-radius: 18px;
        background: rgba(255, 178, 74, 0.1);
        padding: 12px 14px;
        font-size: 14px;
        line-height: 1.74;
      }

      .rich-code-block {
        overflow-x: auto;
        border: 1px solid var(--border-soft);
        border-radius: 18px;
        background: rgba(5, 10, 18, 0.9);
        padding: 14px 16px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 13px;
        line-height: 1.62;
        color: var(--cloud-100);
      }

      .inline-code {
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.08);
        padding: 2px 6px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 13px;
        color: var(--signal-blue);
      }

      .protocol-strip {
        margin-top: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        border-top: 1px solid var(--border-soft);
        padding-top: 12px;
      }

      .typing-indicator {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
      }

      .typing-avatar-strip {
        display: flex;
        align-items: center;
      }

      .typing-avatar-wrap {
        margin-left: -8px;
        border-radius: 16px;
        background: rgba(5, 10, 18, 0.82);
        padding: 4px;
      }

      .typing-avatar-wrap:first-child {
        margin-left: 0;
      }

      .typing-copy {
        min-width: 0;
        flex: 1;
      }

      .typing-title {
        font-size: 14px;
        font-weight: 600;
        color: rgba(246, 242, 235, 0.9);
      }

      .typing-dots {
        margin-top: 4px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .typing-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--signal-teal);
        animation: typing-dot 1.2s ease-in-out infinite;
      }

      .channel-button,
      .dm-button,
      .toolbar-button,
      .suggestion-chip,
      .inline-mention,
      .protocol-strip button,
      .modal-backdrop button {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--cloud-50);
        font: inherit;
        cursor: pointer;
        transition:
          background 0.2s ease,
          border-color 0.2s ease,
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .channel-button,
      .dm-button {
        display: flex;
        width: 100%;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 14px;
        text-align: left;
      }

      .channel-button {
        justify-content: space-between;
      }

      .dm-button {
        justify-content: flex-start;
      }

      .channel-button.is-active,
      .dm-button.is-active {
        border-color: rgba(63, 224, 198, 0.24);
        background: rgba(63, 224, 198, 0.1);
        box-shadow: 0 0 0 1px rgba(63, 224, 198, 0.08);
      }

      .toolbar-button {
        padding: 9px 14px;
        font-weight: 600;
      }

      .toolbar-button.primary {
        border-color: rgba(63, 224, 198, 0.24);
        background: var(--signal-teal);
        color: var(--ink-950);
      }

      .toolbar-button.secondary {
        border-color: rgba(255, 178, 74, 0.24);
        background: rgba(255, 178, 74, 0.1);
        color: var(--signal-amber);
      }

      .inline-mention,
      .protocol-strip button,
      .suggestion-chip {
        padding: 6px 10px;
      }

      .channel-button:hover,
      .dm-button:hover,
      .toolbar-button:hover,
      .suggestion-chip:hover,
      .inline-mention:hover,
      .protocol-strip button:hover,
      .modal-backdrop button:hover {
        border-color: rgba(63, 224, 198, 0.28);
        background: rgba(255, 255, 255, 0.08);
        transform: translateY(-1px);
      }

      .toolbar-button.primary:hover {
        background: #49f2d7;
      }

      .toolbar-button.is-disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .field-input,
      textarea,
      input {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        background: rgba(5, 10, 18, 0.9);
        color: var(--cloud-50);
        padding: 12px 14px;
      }

      .field-input:focus,
      textarea:focus,
      input:focus {
        outline: none;
        border-color: rgba(63, 224, 198, 0.4);
        box-shadow: 0 0 0 3px rgba(63, 224, 198, 0.18);
      }

      .composer-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 236px;
        gap: 12px;
        align-items: end;
      }

      .composer-side {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .round-card {
        border: 1px solid var(--border-quiet);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
        padding: 14px;
      }

      .suggestion-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }

      .empty-state {
        display: flex;
        height: 100%;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .empty-copy {
        max-width: 48rem;
        text-align: center;
      }

      .empty-copy h2 {
        font-family: "Space Grotesk", "Manrope", sans-serif;
        font-size: clamp(2.4rem, 5vw, 4rem);
        font-weight: 600;
        line-height: 1.04;
        letter-spacing: -0.05em;
      }

      .empty-avatar-cloud {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 16px;
        margin-bottom: 24px;
      }

      .empty-avatar-wrap {
        border-radius: 28px;
        background: rgba(5, 10, 18, 0.6);
        padding: 8px;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;

        const lowered = normalizeOwnerInput(input).toLowerCase();
        const buildIntent =

          /\b(app|website|platform|dashboard|api|portal|tool|system|feature|product)\b/.test(lowered);

          lowered.endsWith("?") &&

          if (step.id === activeStepId) {

          .replace(/\b(with|that|where|for example|please)\b.*$/i, "")
          .replace(/[,:;]+$/g, "")

        if (normalized && normalized.length <= 52) {

      function buildWelcomeMessage() {

I am Rhea, and I run the room.

      function createReadySessionState() {

          id: "session-ready",

      function createEmptyChannels() {
        const channels = {
          [TEAM_CHANNEL_ID]: [],
        };
        AGENTS.forEach((agent) => {
          channels[channelIdForAgent(agent.id)] = [];
        });

      function createDefaultInitialState() {
        const channels = createEmptyChannels();
        channels[TEAM_CHANNEL_ID] = [
          createAgentMessage(TEAM_CHANNEL_ID, "rhea", buildWelcomeMessage(), {
            mode: "team",

          }),
        ];

        return {
          activeChannelId: TEAM_CHANNEL_ID,
          messagesByChannel: channels,
          unreadCounts: Object.fromEntries(
            [TEAM_CHANNEL_ID, ...AGENTS.map((agent) => channelIdForAgent(agent.id))].map((channelId) => [channelId, 0]),
          ),

      function compactWorkspaceForStorage(workspace) {
        const messagesByChannel = {};
        Object.entries(workspace.messagesByChannel || {}).forEach(([channelId, messages]) => {
          messagesByChannel[channelId] = Array.isArray(messages)
            ? messages.slice(-MAX_STORED_MESSAGES_PER_CHANNEL)
            : [];
        });
        return {
          ...workspace,
          messagesByChannel,
          typingAgents: [],
          agentStatuses: Object.fromEntries(AGENTS.map((agent) => [agent.id, "active"])),
        };
      }

      function hydrateStoredWorkspace(stored, fallback) {
        if (!stored || typeof stored !== "object") {
          return fallback;
        }

        const validChannelIds = [TEAM_CHANNEL_ID, ...AGENTS.map((agent) => channelIdForAgent(agent.id))];
        const messagesByChannel = { ...fallback.messagesByChannel };
        validChannelIds.forEach((channelId) => {
          const storedMessages = stored.messagesByChannel && stored.messagesByChannel[channelId];
          if (Array.isArray(storedMessages)) {
            messagesByChannel[channelId] = storedMessages.filter(Boolean).slice(-MAX_STORED_MESSAGES_PER_CHANNEL);
          }
        });
        if (!messagesByChannel[TEAM_CHANNEL_ID] || !messagesByChannel[TEAM_CHANNEL_ID].length) {
          messagesByChannel[TEAM_CHANNEL_ID] = fallback.messagesByChannel[TEAM_CHANNEL_ID];
        }

        const unreadCounts = { ...fallback.unreadCounts };
        validChannelIds.forEach((channelId) => {
          const value = stored.unreadCounts && Number(stored.unreadCounts[channelId]);
          unreadCounts[channelId] = Number.isFinite(value) && value > 0 ? value : 0;
        });

        const activeChannelId = validChannelIds.includes(stored.activeChannelId) ? stored.activeChannelId : TEAM_CHANNEL_ID;
        const activeTask =
          stored.activeTask && typeof stored.activeTask === "object"
            ? {
                ...fallback.activeTask,
                ...stored.activeTask,
                ownerIds: Array.isArray(stored.activeTask.ownerIds) ? stored.activeTask.ownerIds : fallback.activeTask.ownerIds,
                route: Array.isArray(stored.activeTask.route) ? stored.activeTask.route : [],
              }
            : fallback.activeTask;

        return {
          ...fallback,
          activeChannelId,
          messagesByChannel,
          unreadCounts,
          activeTask,
          agentStatuses: fallback.agentStatuses,
          typingAgents: [],
        };
      }

      function loadStoredWorkspace(fallback) {
        try {
          const raw = window.localStorage.getItem(WORKSPACE_STORAGE_KEY);
          if (!raw) {
            return fallback;
          }
          return hydrateStoredWorkspace(JSON.parse(raw), fallback);
        } catch (error) {
          console.error(error);
          return fallback;
        }
      }

      function createInitialState() {
        return loadStoredWorkspace(createDefaultInitialState());
      }

      function workspaceReducer(state, action) {
        switch (action.type) {
          case "SET_ACTIVE_CHANNEL":
            return {
              ...state,
              activeChannelId: action.channelId,
              unreadCounts: {
                ...state.unreadCounts,
                [action.channelId]: 0,
              },
            };
          case "ADD_MESSAGE": {
            const nextMessages = {
              ...state.messagesByChannel,
              [action.channelId]: [...state.messagesByChannel[action.channelId], action.message],
            };
            const nextUnread = { ...state.unreadCounts };
            if (action.markUnread) {
              nextUnread[action.channelId] = (nextUnread[action.channelId] || 0) + 1;
            }
            return {
              ...state,
              messagesByChannel: nextMessages,
              unreadCounts: nextUnread,
            };
          }
          case "SET_AGENT_STATUSES":
            return {
              ...state,
              agentStatuses: {
                ...state.agentStatuses,
                ...action.statuses,
              },
            };
          case "SET_TYPING":
            return {
              ...state,
              typingAgents: action.agentIds,
            };
          case "SET_ACTIVE_TASK":
            return {
              ...state,
              activeTask: {
                ...state.activeTask,
                ...action.payload,
                updatedAt: nowIso(),
              },
            };
          default:
            return state;
        }
      }

      function createOwnerMessage(channelId, body, meta = {}) {

      function extractMentions(body) {

      function formatTimestamp(value) {
        try {
          return new Intl.DateTimeFormat([], {

          }).format(new Date(value));

      function titleCase(value) {
        return value
          .split(/\s+/)

      function summarizeTaskTitle(input, kind) {
        const compact = normalizeOwnerInput(input);
        const lowered = compact.toLowerCase();
        if (/(build|create|make|implement|develop|ship|launch|code|prototype|scaffold|produce|deliver)\b/.test(lowered)) {
          return inferProductSubject(compact, { title: "New Initiative" });
        }
        if (kind === "incident") {
          return "Incident Sweep";
        }
        if (kind === "performance") {
          return "Performance Response";
        }
        if (kind === "design") {
          return "Design Decision Sprint";
        }
        if (kind === "backend") {
          return "Backend Delivery Track";
        }
        if (kind === "product") {
          return "Product Direction Pass";
        }
        const words = compact
          .replace(/[^\w\s-]/g, "")
          .split(/\s+/)
          .slice(0, 5)
          .join(" ");
        return titleCase(words || "New Initiative");
      }

      function buildProjectBrief(input, kind) {
        const normalized = normalizeOwnerInput(input);
        if (kind === "incident") {
          return `Owner signaled a problem: "${normalized}". Treat this as a visible issue that needs a fast diagnosis, a mitigation path, and a clean release answer.`;
        }
        if (kind === "performance") {
          return `Owner is worried about speed or responsiveness: "${normalized}". Prioritize triage, likely bottlenecks, and a fix path that can ship without drama.`;
        }
        if (kind === "design") {
          return `Owner wants a design-led move: "${normalized}". Align product scope, interface direction, implementation readiness, and launch quality.`;
        }
        if (kind === "backend") {
          return `Owner asked for a backend-heavy outcome: "${normalized}". Lock the product contract first, then design the API and release path around it.`;
        }
        if (kind === "product") {
          return `Owner is asking for product definition: "${normalized}". Clarify scope, success, and sequencing before the build effort expands.`;
        }
        return `Owner wants a new product outcome: "${normalized}". The team should discuss it like a real delivery squad, then return a roadmap, architecture diagram, implementation package, QA/release bar, and owner-ready handoff.`;
      }

      function selectDiscussionAgents(input, kind) {
        const normalized = normalizeOwnerInput(input);
        const mentions = extractMentions(normalized).filter((agentId) => agentId !== "rhea");
        const defaults = {
          feature: ["marcus", "zara", "kai"],
          product: ["marcus", "zara", "kai"],
          design: ["zara", "marcus", "kai"],
          backend: ["marcus", "priya", "kai"],
          performance: ["nox", "priya", "kai"],
          incident: ["nox", "priya", "kai"],
        };
        const complements = {
          marcus: ["zara", "kai", "priya"],
          zara: ["marcus", "kai", "nox"],
          kai: ["zara", "priya", "nox"],
          priya: ["marcus", "kai", "nox"],
          nox: ["priya", "kai", "marcus"],
        };

        if (mentions.length) {
          const lead = mentions[0];
          return uniqueAgentIds([
            ...mentions,
            ...(complements[lead] || []),
            ...(defaults[kind] || defaults.feature),
          ]).slice(0, 3);
        }

        return (defaults[kind] || defaults.feature).slice(0, 3);
      }

      function classifyTask(input) {
        const normalized = normalizeOwnerInput(input);
        const lowered = normalized.toLowerCase();
        let kind = "feature";
        const hasBuildIntent =
          /(build|create|make|implement|develop|ship|launch|code|prototype|scaffold|produce|deliver)\b/.test(lowered) ||
          /\b(app|website|platform|dashboard|api|portal|tool|system|feature|product)\b/.test(lowered);

        if (/(slow|latency|lag|performance|optimi[sz]e|sluggish|load time)/.test(lowered)) {
          kind = "performance";
        } else if (/(bug|broken|issue|error|complaint|blocked|outage|security|deploy|incident|failing)/.test(lowered)) {
          kind = "incident";
        } else if (/(api|backend|database|schema|server|auth|webhook|queue)/.test(lowered)) {
          kind = "backend";
        } else if (hasBuildIntent) {
          kind = "feature";
        } else if (/(ui|ux|design|wireframe|landing page|flow|copy|experience)/.test(lowered)) {
          kind = "design";
        } else if (/(roadmap|scope|requirements|stories|user story|prd|priorit)/.test(lowered)) {
          kind = "product";
        }

        const deliveryMode = shouldRunProductionDelivery(normalized, kind);
        const selectedAgentIds = deliveryMode ? CORE_DELIVERY_AGENTS : selectDiscussionAgents(normalized, kind);

        return {
          id: uid("task"),
          kind,
          title: summarizeTaskTitle(normalized, kind),
          brief: buildProjectBrief(normalized, kind),
          ownerIds: selectedAgentIds,
          status: "Planning",
          stage: "Rhea is selecting the right voices",
          route: deliveryMode ? buildDeliveryRoute() : [],
          selectedAgentIds,
          deliveryMode,
        };
      }

      function phaseMeta(phaseAgents, phaseIndex, totalPhases) {
        const joined = phaseAgents.join("-");
        if (phaseIndex === 0) {
          return { status: "Planning", stage: "Routing" };
        }
        if (phaseIndex === totalPhases - 1 && phaseAgents.length === 1 && phaseAgents[0] === "rhea") {
          return { status: "Done", stage: "Owner-ready summary" };
        }
        if (joined.includes("nox")) {
          return { status: "Review", stage: "QA and ship check" };
        }
        if (joined.includes("kai") || joined.includes("priya")) {
          return { status: "In Progress", stage: "Implementation pass" };
        }
        return { status: "Planning", stage: "Product and design shaping" };
      }

      function shouldRouteThroughTeamRoom(text) {
        const lowered = text.toLowerCase().trim();
        const looksLikeQuestion =
          lowered.endsWith("?") ||
          /^(why|what|how|when|where|who|is|are|can|could|would|should|do|did)\b/.test(lowered);
        const looksLikeTask =
          /(build|fix|make|create|design|ship|launch|investigate|improve|refactor|implement|handle|solve|users are|need)/.test(lowered);
        return looksLikeTask && !looksLikeQuestion;
      }

      function getStatusClasses(status) {
        const normalized = status.toLowerCase();
        if (normalized === "planning") {
          return "status-pill status-planning";
        }
        if (normalized === "review") {
          return "status-pill status-review";
        }
        if (normalized === "done") {
          return "status-pill status-done";
        }
        if (normalized === "blocked") {
          return "status-pill status-blocked";
        }
        if (normalized === "standby") {
          return "status-pill status-standby";
        }
        return "status-pill status-progress";

      function getAccentClasses(accent) {
        return `accent-${accent || "signal-teal"}`;

      function formatChannelPreview(messages) {
        if (!messages.length) {
          return "No messages yet.";
        }
        return messages[messages.length - 1].body.replace(/\s+/g, " ").trim().slice(0, 88);
      }

      function serializeHistory(messages) {
        return messages
          .slice(-14)
          .map((message) => {
            return `${message.authorName} (${message.authorRole}): ${message.body}`;
          })
          .join("\n\n");
      }

      function isPureMentionLine(line) {
        return /^(@(?:Rhea|Marcus|Zara|Kai|Priya|Nox)\s*)+$/i.test((line || "").trim());
      }

      function stripMentions(text) {
        return (text || "").replace(/@(?:Rhea|Marcus|Zara|Kai|Priya|Nox)/g, "").replace(/\s+/g, " ").trim();
      }

      function findLatestAgentMessage(messages, agentId, { excludeSystem = false } = {}) {
        return (
          [...(messages || [])]
            .reverse()
            .find(
              (message) =>
                message.authorType === "agent" &&
                message.authorId === agentId &&
                (!excludeSystem || !(message.meta && message.meta.system)),
            ) || null
        );
      }

      function findLatestRoomContextMessage(agentId, teamMessages) {
        return (
          findLatestAgentMessage(teamMessages, agentId, { excludeSystem: true }) ||
          [...(teamMessages || [])]
            .reverse()
            .find((message) => message.authorType === "agent" && !(message.meta && message.meta.system)) ||
          null
        );
      }

      function extractMessageInsights(body) {
        const lines = (body || "")
          .replace(/```[\s\S]*?```/g, "")
          .split("\n")
          .map((line) => stripMentions(line.replace(/[*_`>#]/g, " ").trim()))
          .filter((line) => line.length > 0 && !isPureMentionLine(line));

        const bullets = lines
          .filter((line) => /^-\s+/.test(line))
          .map((line) => line.replace(/^-\s+/, "").trim())
          .filter(Boolean);

        const prose = lines.filter((line) => !/^-\s+/.test(line));
        const headline = prose.length ? prose[0].replace(/:\s*$/, "").trim() : "";
        const secondary = prose.slice(headline ? 1 : 0).filter(Boolean);
        const points = bullets.length ? bullets.slice(0, 3) : secondary.slice(0, 3);
        const short = bullets[0] || secondary[0] || headline || "";

        return {
          headline,
          short,
          points: points.length ? points : short ? [short] : [],
        };
      }

      function formatInsightPoints(insights) {
        if (!insights || !insights.points || !insights.points.length) {
          return "";
        }
        return insights.points.slice(0, 3).map((point) => `- ${point}`).join("\n");
      }

      function buildDynamicDmFallback(agent, task, ownerInput, teamMessages, channelMessages) {
        const normalizedOwnerInput = normalizeOwnerInput(ownerInput);
        const lowered = normalizedOwnerInput.toLowerCase();
        const latestRoomMessage = findLatestRoomContextMessage(agent.id, teamMessages);
        const latestDmMessage = findLatestAgentMessage(channelMessages, agent.id);
        const roomInsights = latestRoomMessage ? extractMessageInsights(latestRoomMessage.body) : null;
        const dmInsights = latestDmMessage ? extractMessageInsights(latestDmMessage.body) : null;
        const roomMentioned = /#team-room|team room/.test(lowered);
        const activeInsights = roomMentioned ? roomInsights || dmInsights : dmInsights || roomInsights;

        const roleAngles = {
          rhea: "The real coordination question for me is whether the right people are solving the right slice of the problem right now.",
          marcus: "The product pressure point for me is still the outcome, the scope line, and what we can cut without weakening the release.",
          zara: "The experience pressure point for me is whether the flow stays clear, trustworthy, and easy to act on.",
          kai: "The build pressure point for me is what we can ship cleanly without bloating the interface or the code path.",
          priya: "The systems pressure point for me is whether the contract and failure behavior stay simple enough to trust.",
          nox: "The release pressure point for me is what breaks under stress and whether we are being honest about ship readiness.",
        };

        const roleOffers = {
          rhea: "If you want, I can tell you who should speak next or what the next decision actually is.",
          marcus: "If you want, I can turn that into a sharper product brief or tell you which part matters most.",
          zara: "If you want, I can translate that into the user-flow version instead of the product version.",
          kai: "If you want, I can turn that into an implementation read instead of a strategy read.",
          priya: "If you want, I can translate that into the contract and system implications directly.",
          nox: "If you want, I can tell you the ship-risk version instead of the polite version.",
        };

        const focusLead =
          roomMentioned && roomInsights && roomInsights.headline
            ? `In #team-room I was talking about ${roomInsights.headline.toLowerCase()}.`
            : roomMentioned && roomInsights && roomInsights.short
              ? `In #team-room I was focused on ${roomInsights.short}.`
              : dmInsights && dmInsights.headline
                ? `In our DM, I was talking about ${dmInsights.headline.toLowerCase()}.`
                : dmInsights && dmInsights.short
                  ? `In our DM, I was focused on ${dmInsights.short}.`
                  : roomInsights && roomInsights.headline
                    ? `In #team-room I was talking about ${roomInsights.headline.toLowerCase()}.`
                    : roomInsights && roomInsights.short
                      ? `In #team-room I was focused on ${roomInsights.short}.`
                      : task && task.id !== "session-ready"
                        ? `We are still talking about ${task.title}.`
                        : "I am with you.";

        const insightPoints = formatInsightPoints(activeInsights);
        const memoryIntent = /(remember|recall|what are we discussing|what were we discussing|do you remember|do you recall)/.test(lowered);
        const clarifyIntent =
          /(what was that|what .*exactly|what did you mean|clarify|be concrete|say more|spell it out|explain|which part|what thing)/.test(lowered) ||
          /#team-room|team room/.test(lowered);
        const conversationIntent = /^(hi|hello|hey)\b/.test(lowered) || /(talk to me|go on|continue|walk me through it|tell me more)/.test(lowered);

        if (clarifyIntent && activeInsights) {
          return [`Yes. ${focusLead}`, insightPoints, `${roleAngles[agent.id]} ${roleOffers[agent.id]}`].filter(Boolean).join("\n\n");
        }

        if (memoryIntent && activeInsights) {
          return [`I do. ${focusLead}`, insightPoints, roleOffers[agent.id]].filter(Boolean).join("\n\n");
        }

        if (conversationIntent && activeInsights) {
          return [focusLead, `${roleAngles[agent.id]} ${roleOffers[agent.id]}`].filter(Boolean).join("\n\n");
        }

        if (activeInsights && activeInsights.short) {
          return [`My direct read is this: ${activeInsights.short}`, `${roleAngles[agent.id]} ${roleOffers[agent.id]}`]
            .filter(Boolean)
            .join("\n\n");
        }

        return null;
      }

      function extractJsonBlock(rawText) {
        const text = rawText.trim();
        try {
          return JSON.parse(text);
        } catch (error) {
          const match = text.match(/\{[\s\S]*\}/);
          if (!match) {
            return null;
          }
          try {
            return JSON.parse(match[0]);
          } catch (innerError) {
            return null;
          }
        }
      }

      async function callBackendAgentTurn({
        systemPrompt,
        userPrompt,
        maxTokens = 700,
        agentId = "",
        agentName = "",
        agentRole = "",
        mode = "",
        phaseLabel = "",
      }) {
        const baseUrl = getApplicationBackendBaseUrl();
        const response = await fetch(`${baseUrl}/api/agent-turns`, {
          method: "POST",
          headers: {
            "content-type": "application/json",
          },
          body: JSON.stringify({
            system_prompt: systemPrompt,
            user_prompt: userPrompt,
            max_tokens: maxTokens,
            agent_id: agentId,
            agent_name: agentName,
            agent_role: agentRole,
            mode,
            phase_label: phaseLabel,
          }),
        });

        if (!response.ok) {
          const details = await response.text();
          throw new Error(details || `Backend agent turn failed with ${response.status}`);
        }

        const payload = await response.json();
        return payload;
      }

      function buildAgentSystemPrompt(agent, mode) {

          .map((item) => `- ${item.name}: ${item.role}. Specialty: ${item.specialty}.`)

        const modeInstructions = {
          team: "You are participating in a facilitator-led multi-agent discussion in #team-room. Rhea selects the relevant voices for each round. Be concise, collaborative, and build on what has already been said instead of repeating it.",
          dm: "You are replying in a private DM with the owner. Stay in character, answer directly, and use team context without sounding robotic.",
          standup: "You are posting a morning standup update in #team-room. Reply in exactly two sentences.",
        };

        return `
You are ${agent.name}, the ${agent.role} inside ARIA, an AI-run intelligence agency where the owner is the CEO.

      function getApplicationBackendBaseUrl() {
        try {
          const saved = window.localStorage.getItem("aria-bmad-backend-url");
          if (saved) {
            return saved.replace(/\/$/, "");
          }
        } catch (error) {
          console.error(error);
        }
        if (window.location.port === "8091") {
          return "";
        }
        return "http://127.0.0.1:8091";
      }

      async function persistApplicationPackage({ appName, ownerInput, task, artifacts }) {
        const baseUrl = getApplicationBackendBaseUrl();
        const response = await fetch(`${baseUrl}/api/applications`, {
          method: "POST",
          headers: {
            "content-type": "application/json",
          },
          body: JSON.stringify({
            app_name: appName,
            owner_input: ownerInput,
            task,
            artifacts,
          }),
        });

        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.error || `Application save failed with ${response.status}`);
        }
        return payload;
      }

      function slugifyAppName(value) {
        return String(value || "")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "") || "new-app";
      }

      function isApplicationMemoryQuestion(text) {
        const lowered = normalizeOwnerInput(text).toLowerCase();
        const asksHowToRun = /(how\s+(do|can|to)\s+.*\brun|how\s+to\s+run|run\s+it|start\s+it|open\s+it|npm\s+run|localhost|vite)/.test(lowered);
        const pointsToPastApp =
          /(you\s+(created|made|built)|earlier|previous|past|already|under\s+.*bmad-applications|bmad-applications|calendar-app|to-do-app|todo-app)/.test(lowered) ||
          /\b(calendar|to[-\s]?do|todo|task)\s+app\b/.test(lowered);
        return asksHowToRun && pointsToPastApp;
      }

      function extractApplicationSlugCandidate(text) {
        const normalized = normalizeOwnerInput(text);
        const pathMatch = normalized.match(/bmad-applications\/([a-z0-9][a-z0-9-]*)/i);
        if (pathMatch) {
          return slugifyAppName(pathMatch[1]);
        }
        const explicitSlug = normalized.match(/\b([a-z0-9]+(?:-[a-z0-9]+)+)\b/i);
        if (explicitSlug && /app|todo|calendar|task/.test(explicitSlug[1].toLowerCase())) {
          return slugifyAppName(explicitSlug[1]);
        }
        const appName = normalized.match(/\b([a-z0-9][a-z0-9\s-]{1,44}?\s+app)\b/i);
        if (appName) {
          return slugifyAppName(appName[1]);
        }
        return "";
      }

      async function fetchApplications() {
        const baseUrl = getApplicationBackendBaseUrl();
        const response = await fetch(`${baseUrl}/api/applications`);
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.error || `Application lookup failed with ${response.status}`);
        }
        return payload;
      }

      function findApplicationForQuestion(text, applications) {
        const candidate = extractApplicationSlugCandidate(text);
        if (candidate) {
          const exact = applications.find((app) => app.slug === candidate);
          if (exact) {
            return exact;
          }
          const relaxed = applications.find((app) => candidate.includes(app.slug) || app.slug.includes(candidate));
          if (relaxed) {
            return relaxed;
          }
        }

        const lowered = normalizeOwnerInput(text).toLowerCase();
        return (
          applications.find((app) => lowered.includes(String(app.slug || "").toLowerCase())) ||
          applications.find((app) => lowered.includes(String(app.app_name || "").toLowerCase())) ||
          applications[0] ||
          null
        );
      }

      function buildApplicationRunReply(app, allApps = []) {
        if (!app) {
          const known = allApps.slice(0, 5).map((item) => `- ${item.app_name}: ${item.application_path}`).join("\n");
          return [
            "I do not see that app workspace yet.",
            "",
            known ? `I do remember these saved app folders:\n${known}` : "I do not have any saved app folders under the BMAD applications root yet.",
            "",
            "Give me the app name or folder slug and I will look it up again.",
          ].join("\n");
        }

        const commands = Array.isArray(app.run_commands) && app.run_commands.length
          ? app.run_commands
          : [`cd ${app.application_path}`, "npm install", "npm run dev"];
        const missing = Array.isArray(app.missing_runtime_files) ? app.missing_runtime_files : [];
        const lines = [
          `I remember this one. I found ${app.app_name} at:`,
          "",
          app.application_path,
          "",
        ];

        if (app.runnable) {
          lines.push("Run it like this:", "", "```bash", ...commands, "```", "", "Then open the local Vite URL it prints, usually `http://127.0.0.1:5173/`.");
        } else {
          lines.push(
            "That folder has the saved BMAD artifacts, but it is missing the runnable Vite scaffold:",
            "",
            ...missing.map((file) => `- ${file}`),
            "",
            "Once those files are present, the run command will be:",
            "",
            "```bash",
            ...commands,
            "```",
          );
        }

        if (Array.isArray(app.source_files) && app.source_files.length) {
          lines.push("", `Main source I found: ${app.source_files[0]}`);
        }
        return lines.join("\n");
      }

      function renderInlineText(text, onMentionClick, keyPrefix) {
        const nodes = [];
        const pattern = /(`[^`]+`|@(?:Rhea|Marcus|Zara|Kai|Priya|Nox))/g;
        let cursor = 0;
        let match;

        while ((match = pattern.exec(text)) !== null) {
          const value = match[0];
          const start = match.index;
          if (start > cursor) {
            nodes.push(<span key={`${keyPrefix}-text-${cursor}`}>{text.slice(cursor, start)}</span>);
          }

          if (value.startsWith("@")) {
            const agent = getAgentByName(value);
            nodes.push(
              <button
                key={`${keyPrefix}-mention-${start}`}
                type="button"
                onClick={() => agent && onMentionClick(agent.id)}
                className="inline-mention rounded-full border border-signal-teal/30 bg-signal-teal/12 px-2 py-0.5 font-mono text-[0.74rem] text-signal-teal transition hover:border-signal-teal/60 hover:bg-signal-teal/18"
              >
                {value}
              </button>,
            );
          } else {
            nodes.push(
              <code
                key={`${keyPrefix}-code-${start}`}
                className="inline-code rounded-md bg-white/[0.08] px-1.5 py-0.5 font-mono text-[0.8rem] text-signal-blue"
              >
                {value.slice(1, -1)}
              </code>,
            );
          }

          cursor = start + value.length;
        }

        if (cursor < text.length) {
          nodes.push(<span key={`${keyPrefix}-tail`}>{text.slice(cursor)}</span>);
        }

        return nodes;
      }

      function MermaidBlock({ chart, blockId }) {
        const [svg, setSvg] = useState("");
        const [renderFailed, setRenderFailed] = useState(false);
        const renderId = useRef(`aria-${blockId.replace(/[^a-zA-Z0-9_-]/g, "-")}-${uid("diagram")}`).current;

        useEffect(() => {
          let cancelled = false;

          async function renderDiagram() {
            if (!window.mermaid) {
              return;
            }
            try {
              window.mermaid.initialize({
                startOnLoad: false,
                theme: "dark",
                securityLevel: "strict",
                themeVariables: {
                  background: "transparent",
                  primaryColor: "#102039",
                  primaryTextColor: "#F6F2EB",
                  primaryBorderColor: "#3FE0C6",
                  lineColor: "#6AB7FF",
                  secondaryColor: "#173C31",
                  tertiaryColor: "#271516",
                  fontFamily: "Manrope, sans-serif",
                },
              });
              const result = await window.mermaid.render(renderId, chart);
              if (!cancelled) {
                setSvg(result.svg);
                setRenderFailed(false);
              }
            } catch (error) {
              console.error(error);
              if (!cancelled) {
                setRenderFailed(true);
              }
            }
          }

          renderDiagram();
          return () => {
            cancelled = true;
          };
        }, [chart, renderId]);

        return (
          <div className="mermaid-card overflow-x-auto rounded-2xl border border-signal-teal/18 bg-ink-950/72 px-4 py-4">
            {svg && !renderFailed ? (
              <div className="mermaid-render min-w-[520px]" dangerouslySetInnerHTML={{ __html: svg }} />
            ) : (
              <pre className="font-mono text-[0.8rem] leading-6 text-cloud-100">
                <code>{chart}</code>
              </pre>
            )}
          </div>
        );
      }

      function renderRichText(body, onMentionClick, keyPrefix) {
        const pieces = body.split(/```/);
        return pieces.map((piece, pieceIndex) => {
          if (pieceIndex % 2 === 1) {
            const rawCode = piece.trim();
            const firstLineBreak = rawCode.indexOf("\n");
            const possibleLanguage = firstLineBreak > -1 ? rawCode.slice(0, firstLineBreak).trim() : "";
            const language = /^[a-z0-9_-]+$/i.test(possibleLanguage) ? possibleLanguage.toLowerCase() : "";
            const codeBody = language ? rawCode.slice(firstLineBreak + 1).trim() : rawCode;

            if (language === "mermaid") {
              return <MermaidBlock key={`${keyPrefix}-mermaid-${pieceIndex}`} chart={codeBody} blockId={`${keyPrefix}-${pieceIndex}`} />;
            }

            return (
              <pre
                key={`${keyPrefix}-pre-${pieceIndex}`}
                className="rich-code-block overflow-x-auto rounded-2xl border border-white/10 bg-ink-950/90 px-4 py-3 font-mono text-[0.8rem] leading-6 text-cloud-100"
              >
                <code>{codeBody}</code>
              </pre>
            );
          }

          return piece
            .split(/\n{2,}/)
            .filter((block) => block.trim().length > 0)
            .map((block, blockIndex) => {
              const lines = block.split("\n");
              const trimmedLines = lines.map((line) => line.trim()).filter(Boolean);

              if (trimmedLines.length && trimmedLines.every((line) => /^-\s+/.test(line))) {
                return (
                  <ul key={`${keyPrefix}-ul-${pieceIndex}-${blockIndex}`} className="rich-list space-y-2 pl-5">
                    {trimmedLines.map((line, lineIndex) => (
                      <li
                        key={`${keyPrefix}-li-${pieceIndex}-${blockIndex}-${lineIndex}`}
                        className="rich-list-item text-[0.96rem] leading-7 text-cloud-50/92"
                      >
                        {renderInlineText(line.replace(/^-\s+/, ""), onMentionClick, `${keyPrefix}-li-${lineIndex}`)}
                      </li>
                    ))}
                  </ul>
                );
              }

              if (/^Decision:/i.test(trimmedLines[0] || "")) {
                return (
                  <div
                    key={`${keyPrefix}-decision-${pieceIndex}-${blockIndex}`}
                    className="decision-card rounded-2xl border border-signal-amber/20 bg-signal-amber/10 px-4 py-3 text-[0.94rem] leading-7 text-cloud-50"
                  >
                    {trimmedLines.map((line, lineIndex) => (
                      <p key={`${keyPrefix}-decision-line-${lineIndex}`}>
                        {renderInlineText(line, onMentionClick, `${keyPrefix}-decision-inline-${lineIndex}`)}
                      </p>
                    ))}
                  </div>
                );
              }

              return (
                <div
                  key={`${keyPrefix}-p-${pieceIndex}-${blockIndex}`}
                  className="rich-block space-y-2 text-[0.97rem] leading-7 text-cloud-50/92"
                >
                  {lines.map((line, lineIndex) => {
                    if (!line.trim()) {
                      return <div key={`${keyPrefix}-spacer-${pieceIndex}-${blockIndex}-${lineIndex}`} className="h-2" />;
                    }
                    return (
                      <p key={`${keyPrefix}-line-${pieceIndex}-${blockIndex}-${lineIndex}`}>
                        {renderInlineText(line, onMentionClick, `${keyPrefix}-inline-${pieceIndex}-${blockIndex}-${lineIndex}`)}
                      </p>
                    );
                  })}
                </div>
              );
            });
        });
      }
