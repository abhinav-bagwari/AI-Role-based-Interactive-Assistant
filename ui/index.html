      function App() {
        const [workspace, dispatch] = useReducer(workspaceReducer, undefined, createInitialState);
        const [composer, setComposer] = useState("");
        const [taskModalOpen, setTaskModalOpen] = useState(false);
        const [bootSequence] = useState("live");
        const [profileAgentId, setProfileAgentId] = useState(null);
        const [relayError, setRelayError] = useState("");
        const workspaceRef = useRef(workspace);
        const queueRef = useRef(Promise.resolve());
        const messageScrollerRef = useRef(null);
        const composerInputRef = useRef(null);

        useEffect(() => {
          workspaceRef.current = workspace;
        }, [workspace]);

        useEffect(() => {
          try {
            window.localStorage.setItem(WORKSPACE_STORAGE_KEY, JSON.stringify(compactWorkspaceForStorage(workspace)));
          } catch (error) {
            console.error(error);
          }
        }, [workspace]);

        function setActiveChannel(channelId) {
          transition(() => dispatch({ type: "SET_ACTIVE_CHANNEL", channelId }));
        }

        function addMessage(channelId, message, markUnread = false) {
          transition(() => dispatch({ type: "ADD_MESSAGE", channelId, message, markUnread }));
        }

        function patchAgentStatuses(statuses) {
          transition(() => dispatch({ type: "SET_AGENT_STATUSES", statuses }));
        }

        function setTyping(agentIds) {
          transition(() => dispatch({ type: "SET_TYPING", agentIds }));
        }

        function updateActiveTask(payload) {
          transition(() => dispatch({ type: "SET_ACTIVE_TASK", payload }));
        }

        function enqueue(work) {
          queueRef.current = queueRef.current
            .then(() => work())
            .catch((error) => {
              console.error(error);
              setRelayError(error.message || "A workflow step failed.");
              setTyping([]);
              patchAgentStatuses(Object.fromEntries(AGENTS.map((agent) => [agent.id, "active"])));
            });
          return queueRef.current;
        }

        async function generateAgentBody({ agentId, mode, task, ownerInput, nextAgents = [], phaseLabel = "", sourceAgentId = null, channelId }) {
          const agent = AGENT_MAP[agentId];
          const current = workspaceRef.current;
          const teamMessages = current.messagesByChannel[TEAM_CHANNEL_ID] || [];
          const channelMessages = current.messagesByChannel[channelId] || [];
          const teamHistory = serializeHistory(teamMessages);
          const channelHistory = serializeHistory(channelMessages);
          const statuses = Object.fromEntries(
            Object.entries(current.agentStatuses).map(([id, status]) => [AGENT_MAP[id].name, STATUS_META[status].label]),
          );

          try {
            setRelayError("");
            const systemPrompt = buildAgentSystemPrompt(agent, mode);
            const userPrompt = buildAgentUserPrompt({
              mode,
              agent,
              task,
              ownerInput,
              teamHistory,
              channelHistory,
              nextAgents,
              phaseLabel,
              sourceAgentName: getActorDisplayName(sourceAgentId),
              statuses,
            });
            const payload = await callBackendAgentTurn({
              systemPrompt,
              userPrompt,
              maxTokens: task && task.deliveryMode ? 1100 : 650,
              agentId,
              agentName: agent.name,
              agentRole: agent.role,
              mode,
              phaseLabel,
            });
            if (payload.mode === "live" && payload.body && payload.body.trim()) {
              return payload.body.trim();
            }
          } catch (error) {
            console.error(error);
            setRelayError("Backend model bridge was unavailable for that turn. ARIA used local simulation.");
          }

          return buildFallbackMessage(
            agent,
            mode,
            task,
            ownerInput,
            nextAgents,
            phaseLabel,
            getActorDisplayName(sourceAgentId),
            teamMessages,
            channelMessages,
          );
        }

        async function runAgentTurn({ channelId, agentId, mode, task, ownerInput, nextAgents = [], phaseLabel = "", sourceAgentId = null, unreadOverride = null }) {
          setTyping([...new Set([...workspaceRef.current.typingAgents, agentId])]);
          patchAgentStatuses({ [agentId]: "thinking" });
          const body = await generateAgentBody({
            agentId,
            mode,
            task,
            ownerInput,
            nextAgents,
            phaseLabel,
            sourceAgentId,
            channelId,
          });
          const markUnread =
            unreadOverride !== null ? unreadOverride : workspaceRef.current.activeChannelId !== channelId;
          addMessage(
            channelId,
            createAgentMessage(channelId, agentId, body, {
              mode,
              taskId: task.id,
              nextAgents,
              sourceAgentId,
            }),
            markUnread,
          );
          patchAgentStatuses({ [agentId]: "active" });
          setTyping(workspaceRef.current.typingAgents.filter((id) => id !== agentId));
          return body;
        }

        async function startDeliveryIntro(task, ownerInput) {
          const appName = task.title || inferProductSubject(ownerInput, task);
          const baseRoute = task.route && task.route.length ? task.route : buildDeliveryRoute();
          const introTask = {
            ...task,
            title: appName,
            initialRequest: ownerInput,
            ownerContext: "",
            executionInput: "",
            workflowState: "awaiting_brief",
            ownerIds: ["rhea"],
            selectedAgentIds: CORE_DELIVERY_AGENTS,
            route: updateRouteStatus(baseRoute, "kickoff", []),
            deliveryMode: true,
            status: "Planning",
            stage: "Intro meeting",
          };

          updateActiveTask(introTask);
          patchAgentStatuses({ rhea: "thinking" });
          setTyping(["rhea"]);
          await wait(320);
          addMessage(
            TEAM_CHANNEL_ID,
            createAgentMessage(TEAM_CHANNEL_ID, "rhea", buildIntroMeetingMessage(introTask, ownerInput), {
              mode: "team",
              taskId: task.id,
              nextAgents: [],
              sourceAgentId: "owner",
            }),
          );
          updateActiveTask({
            ...introTask,
            status: "Planning",
            stage: "Awaiting owner brief",
            route: updateRouteStatus(baseRoute, "", ["kickoff"]),
          });
          patchAgentStatuses({ rhea: "active" });
          setTyping([]);
        }

        async function runDeliveryHuddleCheckpoint(task, ownerContext) {
          const appName = task.title || inferProductSubject(task.initialRequest || ownerContext, task);
          const baseRoute = task.route && task.route.length ? task.route : buildDeliveryRoute();
          const ownerInput = buildDeliveryBrief(task.initialRequest || appName, ownerContext);
          const completedSteps = ["kickoff"];
          const artifacts = [];
          const huddleTask = {
            ...task,
            title: appName,
            ownerContext,
            executionInput: ownerInput,
            workflowState: "huddling",
            ownerIds: ["rhea"],
            selectedAgentIds: CORE_DELIVERY_AGENTS,
            route: updateRouteStatus(baseRoute, "intake", completedSteps),
            status: "Planning",
            stage: "Briefing the team",
          };

          function recordArtifact(type, title, content) {
            if (!content || !content.trim()) {
              return;
            }
            artifacts.push({ type, title, content: content.trim() });
          }

          updateActiveTask(huddleTask);
          patchAgentStatuses({ rhea: "thinking" });
          setTyping(["rhea"]);
          await wait(320);
          const intakeBody = [
            `Owner brief captured for ${appName}.`,
            "",
            ownerInput,
            "",
            "I’m bringing in Marcus for product scope, Zara for UX, and Priya for system shape. After they weigh in, I’ll come back with the first decision I need from you.",
          ].join("\n");
          addMessage(
            TEAM_CHANNEL_ID,
            createAgentMessage(TEAM_CHANNEL_ID, "rhea", intakeBody, {
              mode: "team",
              taskId: task.id,
              nextAgents: ["marcus", "zara", "priya"],
              sourceAgentId: "owner",
            }),
          );
          recordArtifact("intake", "Owner Brief", intakeBody);
          completedSteps.push("intake");

          const huddleAgents = ["marcus", "zara", "priya"];
          const huddleBodies = [];
          updateActiveTask({
            ...huddleTask,
            workflowState: "huddling",
            ownerIds: huddleAgents,
            stage: "Team huddle",
            route: updateRouteStatus(baseRoute, "discovery", completedSteps),
          });
          patchAgentStatuses(Object.fromEntries(AGENTS.map((agent) => [agent.id, huddleAgents.includes(agent.id) ? "thinking" : "active"])));
          for (let index = 0; index < huddleAgents.length; index += 1) {
            const agentId = huddleAgents[index];
            await wait(index === 0 ? 340 : 460);
            const huddleBody = await runAgentTurn({
              channelId: TEAM_CHANNEL_ID,
              agentId,
              mode: "team",
              task: {
                ...huddleTask,
                ownerIds: huddleAgents,
                route: updateRouteStatus(baseRoute, "discovery", completedSteps),
              },
              ownerInput,
              nextAgents: huddleAgents.slice(index + 1),
              phaseLabel: "Discovery huddle",
              sourceAgentId: index === 0 ? "rhea" : huddleAgents[index - 1],
            });
            huddleBodies.push(`## ${AGENT_MAP[agentId].name}\n\n${huddleBody}`);
          }
          recordArtifact("discovery", "Team Huddle", huddleBodies.join("\n\n"));
          completedSteps.push("discovery");

          const checkpointBody = buildOwnerCheckpointMessage(huddleTask, ownerInput);
          recordArtifact("checkpoint", "Owner Checkpoint", checkpointBody);
          addMessage(
            TEAM_CHANNEL_ID,
            createAgentMessage(TEAM_CHANNEL_ID, "rhea", checkpointBody, {
              mode: "team",
              taskId: task.id,
              nextAgents: [],
              sourceAgentId: "priya",
            }),
          );
          updateActiveTask({
            ...huddleTask,
            workflowState: "awaiting_approval",
            pendingArtifacts: artifacts,
            executionInput: ownerInput,
            ownerContext,
            ownerIds: ["rhea"],
            status: "Planning",
            stage: "Awaiting owner approval",
            route: updateRouteStatus(baseRoute, "checkpoint", completedSteps),
          });
          patchAgentStatuses(Object.fromEntries(AGENTS.map((agent) => [agent.id, "active"])));
          setTyping([]);
        }

        async function handleActiveDeliveryInput(task, ownerText) {
          if (task.workflowState === "awaiting_brief") {
            await runDeliveryHuddleCheckpoint(task, ownerText);
            return;
          }

          if (task.workflowState === "awaiting_approval") {
            if (isApprovalIntent(ownerText) && !isRevisionIntent(ownerText)) {
              addMessage(
                TEAM_CHANNEL_ID,
                createAgentMessage(
                  TEAM_CHANNEL_ID,
                  "rhea",
                  "Approved. I’m starting execution now: roadmap, architecture diagram, implementation package, QA gate, final handoff, then I’ll save the app workspace.",
                  {
                    mode: "team",
                    taskId: task.id,
                    nextAgents: ["marcus", "priya", "kai", "nox"],
                    sourceAgentId: "owner",
                  },
                ),
              );
              await runDeliveryWorkflow(
                {
                  ...task,
                  workflowState: "executing",
                  approvalNote: ownerText,
                },
                task.executionInput || buildDeliveryBrief(task.initialRequest || task.title, task.ownerContext || ""),
              );
              return;
            }

            const revisedContext = [task.ownerContext, ownerText].filter(Boolean).join("\n\nRevision: ");
            addMessage(
              TEAM_CHANNEL_ID,
              createAgentMessage(
                TEAM_CHANNEL_ID,
                "rhea",
                "Got it. I’m treating that as a change to the owner brief, not approval. I’ll rerun the huddle and bring back a revised checkpoint.",
                {
                  mode: "team",
                  taskId: task.id,
                  nextAgents: ["marcus", "zara", "priya"],
                  sourceAgentId: "owner",
                },
              ),
            );
            await runDeliveryHuddleCheckpoint(task, revisedContext);
          }
        }

        async function runDeliveryWorkflow(task, ownerInput) {
          const deliveryAgents = CORE_DELIVERY_AGENTS;
          const baseRoute = task.route && task.route.length ? task.route : buildDeliveryRoute();
          const completedSteps = ["kickoff", "intake", "discovery", "checkpoint"];
          const appName = task.title || inferProductSubject(ownerInput, task);
          const artifacts = Array.isArray(task.pendingArtifacts) ? [...task.pendingArtifacts] : [];
          const deliveryTask = {
            ...task,
            title: appName,
            deliveryMode: true,
            workflowState: "executing",
            selectedAgentIds: deliveryAgents,
            route: baseRoute,
          };

          function recordArtifact(type, title, content) {
            if (!content || !content.trim()) {
              return;
            }
            artifacts.push({
              type,
              title,
              content: content.trim(),
            });
          }

          async function activateStep(stepId, ownerIds, status, stage) {
            updateActiveTask({
              ...deliveryTask,
              ownerIds,
              status,
              stage,
              route: updateRouteStatus(baseRoute, stepId, completedSteps),
            });
            patchAgentStatuses(
              Object.fromEntries(
                AGENTS.map((agent) => [agent.id, ownerIds.includes(agent.id) ? "thinking" : "active"]),
              ),
            );
          }

          async function completeStep(stepId) {
            if (!completedSteps.includes(stepId)) {
              completedSteps.push(stepId);
            }
          }

          await activateStep("roadmap", ["marcus"], "Planning", "Roadmap package");
          await wait(420);
          const roadmapBody = await runAgentTurn({
            channelId: TEAM_CHANNEL_ID,
            agentId: "marcus",
            mode: "team",
            task: {
              ...deliveryTask,
              ownerIds: ["marcus"],
              route: updateRouteStatus(baseRoute, "roadmap", completedSteps),
            },
            ownerInput,
            nextAgents: ["priya"],
            phaseLabel: "Roadmap package",
            sourceAgentId: "priya",
          });
          recordArtifact("roadmap", "Product Roadmap", roadmapBody);
          await completeStep("roadmap");

          await activateStep("diagram", ["priya"], "In Progress", "Architecture diagram");
          await wait(420);
          const diagramBody = await runAgentTurn({
            channelId: TEAM_CHANNEL_ID,
            agentId: "priya",
            mode: "team",
            task: {
              ...deliveryTask,
              ownerIds: ["priya"],
              route: updateRouteStatus(baseRoute, "diagram", completedSteps),
            },
            ownerInput,
            nextAgents: ["kai"],
            phaseLabel: "Architecture diagram",
            sourceAgentId: "marcus",
          });
          recordArtifact("diagram", "Architecture Diagram", diagramBody);
          await completeStep("diagram");

          await activateStep("implementation", ["kai"], "In Progress", "Implementation package");
          await wait(440);
          const implementationBody = await runAgentTurn({
            channelId: TEAM_CHANNEL_ID,
            agentId: "kai",
            mode: "team",
            task: {
              ...deliveryTask,
              ownerIds: ["kai"],
              route: updateRouteStatus(baseRoute, "implementation", completedSteps),
            },
            ownerInput,
            nextAgents: ["nox"],
            phaseLabel: "Implementation package",
            sourceAgentId: "priya",
          });
          recordArtifact("implementation", "Implementation Package", implementationBody);
          await completeStep("implementation");

          await activateStep("release", ["nox"], "Review", "QA and release gate");
          await wait(440);
          const qaBody = await runAgentTurn({
            channelId: TEAM_CHANNEL_ID,
            agentId: "nox",
            mode: "team",
            task: {
              ...deliveryTask,
              ownerIds: ["nox"],
              route: updateRouteStatus(baseRoute, "release", completedSteps),
            },
            ownerInput,
            nextAgents: ["rhea"],
            phaseLabel: "QA and release gate",
            sourceAgentId: "kai",
          });
          recordArtifact("qa", "QA and Release Gate", qaBody);
          await completeStep("release");

          await activateStep("final", ["rhea"], "Done", "Owner-ready delivery package");
          await wait(380);
          const finalBody = await runAgentTurn({
            channelId: TEAM_CHANNEL_ID,
            agentId: "rhea",
            mode: "team",
            task: {
              ...deliveryTask,
              ownerIds: ["rhea"],
              route: updateRouteStatus(baseRoute, "final", completedSteps),
            },
            ownerInput,
            nextAgents: [],
            phaseLabel: "Owner-ready final package",
            sourceAgentId: "nox",
          });
          recordArtifact("final", "Final Owner Handoff", finalBody);
          await completeStep("final");

          updateActiveTask({
            ...deliveryTask,
            ownerIds: ["rhea"],
            status: "Done",
            stage: "Saving app workspace",
            route: updateRouteStatus(baseRoute, "final", completedSteps),
          });

          try {
            const saved = await persistApplicationPackage({
              appName,
              ownerInput,
              task: deliveryTask,
              artifacts,
            });
            const fileLines = (saved.files || [])
              .slice(0, 8)
              .map((file) => `- ${file.label}: ${file.path}`)
              .join("\n");
            addMessage(
              TEAM_CHANNEL_ID,
              createAgentMessage(
                TEAM_CHANNEL_ID,
                "rhea",
                [
                  "Application workspace saved.",
                  "",
                  `- App: ${saved.app_name}`,
                  `- Folder: ${saved.application_path}`,
                  "",
                  "Saved files:",
                  fileLines || "- No files reported by the backend.",
                  "",
                  "Everything for this app should now live under that folder.",
                ].join("\n"),
                {
                  mode: "team",
                  taskId: task.id,
                  nextAgents: [],
                  sourceAgentId: "rhea",
                  persisted: true,
                  applicationPath: saved.application_path,
                },
              ),
            );
          } catch (error) {
            console.error(error);
            addMessage(
              TEAM_CHANNEL_ID,
              createAgentMessage(
                TEAM_CHANNEL_ID,
                "rhea",
                [
                  "I finished the delivery package, but I could not save it to disk yet.",
                  "",
                  `Expected backend: ${getApplicationBackendBaseUrl() || window.location.origin}`,
                  `Target folder: /Users/abhinavbagwari/ai/bmad-applications/${appName.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "")}`,
                  "",
                  `Backend error: ${error.message}`,
                ].join("\n"),
                {
                  mode: "team",
                  taskId: task.id,
                  nextAgents: [],
                  sourceAgentId: "rhea",
                  persisted: false,
                },
              ),
            );
          }

          updateActiveTask({
            ...deliveryTask,
            workflowState: "done",
            ownerIds: ["rhea"],
            status: "Done",
            stage: "Owner-ready package delivered",
            route: updateRouteStatus(baseRoute, "", completedSteps),
          });
          patchAgentStatuses(Object.fromEntries(AGENTS.map((agent) => [agent.id, "active"])));
          setTyping([]);
        }

        async function runTaskWorkflow(task, ownerInput) {
          if (task.deliveryMode) {
            await startDeliveryIntro(task, ownerInput);
            return;
          }

          const selectedAgentIds =
            task.selectedAgentIds && task.selectedAgentIds.length ? task.selectedAgentIds : ["marcus", "zara", "kai"];

          updateActiveTask({
            ...task,
            ownerIds: ["rhea"],
            status: "Planning",
            stage: "Rhea is selecting the right voices",
            selectedAgentIds,
          });

          patchAgentStatuses(
            Object.fromEntries(
              AGENTS.map((agent) => [agent.id, selectedAgentIds.includes(agent.id) || agent.id === "rhea" ? "thinking" : "active"]),
            ),
          );

          await wait(380);
          await runAgentTurn({
            channelId: TEAM_CHANNEL_ID,
            agentId: "rhea",
            mode: "team",
            task: {
              ...task,
              ownerIds: selectedAgentIds,
              selectedAgentIds,
            },
            ownerInput,
            nextAgents: selectedAgentIds,
            phaseLabel: "Initial intake",
            sourceAgentId: null,
          });

          const liveStatus =
            task.kind === "performance" || task.kind === "incident" || task.kind === "backend"
              ? "In Progress"
              : selectedAgentIds.includes("nox")
                ? "Review"
                : "Planning";

          updateActiveTask({
            id: task.id,
            title: task.title,
            brief: task.brief,
            ownerIds: selectedAgentIds,
            status: liveStatus,
            stage: `Live discussion with ${formatAgentList(selectedAgentIds)}`,
            kind: task.kind,
            route: [],
            selectedAgentIds,
          });

          for (let index = 0; index < selectedAgentIds.length; index += 1) {
            const agentId = selectedAgentIds[index];
            const nextRoundAgents = selectedAgentIds.slice(index + 1);
            const sourceAgentId = index === 0 ? "rhea" : selectedAgentIds[index - 1];

            await wait(index === 0 ? 360 : 540);
            await runAgentTurn({
              channelId: TEAM_CHANNEL_ID,
              agentId,
              mode: "team",
              task: {
                ...task,
                ownerIds: selectedAgentIds,
                selectedAgentIds,
                status: liveStatus,
              },
              ownerInput,
              nextAgents: nextRoundAgents,
              phaseLabel: "Discussion round",
              sourceAgentId,
            });
          }

          updateActiveTask({
            id: task.id,
            title: task.title,
            brief: task.brief,
            ownerIds: selectedAgentIds,
            status: liveStatus,
            stage: "Awaiting your next direction",
            kind: task.kind,
            route: [],
            selectedAgentIds,
            deliveryMode: false,
          });

          patchAgentStatuses(Object.fromEntries(AGENTS.map((agent) => [agent.id, "active"])));
          setTyping([]);
        }

        async function answerApplicationMemoryQuestion(ownerText) {
          updateActiveTask({
            ...createReadySessionState(),
            title: "Saved App Lookup",
            brief: "Rhea is checking the saved BMAD application workspace before answering.",
            status: "Planning",
            stage: "Looking up saved app workspace",
          });
          patchAgentStatuses({ rhea: "thinking" });
          setTyping(["rhea"]);
          try {
            const payload = await fetchApplications();
            const applications = Array.isArray(payload.applications) ? payload.applications : [];
            const app = findApplicationForQuestion(ownerText, applications);
            await wait(260);
            addMessage(
              TEAM_CHANNEL_ID,
              createAgentMessage(TEAM_CHANNEL_ID, "rhea", buildApplicationRunReply(app, applications), {
                mode: "team",
                sourceAgentId: "owner",
                nextAgents: [],
                applicationLookup: true,
                applicationPath: app ? app.application_path : "",
              }),
            );
            updateActiveTask({
              ...createReadySessionState(),
              title: app ? app.app_name : "Saved App Lookup",
              brief: app ? `Saved workspace: ${app.application_path}` : "No matching saved app workspace found.",
              status: app ? "Done" : "Blocked",
              stage: app ? "Run instructions returned" : "Needs app name",
            });
          } catch (error) {
            console.error(error);
            addMessage(
              TEAM_CHANNEL_ID,
              createAgentMessage(
                TEAM_CHANNEL_ID,
                "rhea",
                [
                  "I tried to look up the saved app workspace, but the backend lookup failed.",
                  "",
                  `Backend: ${getApplicationBackendBaseUrl() || window.location.origin}`,
                  `Error: ${error.message}`,
                ].join("\n"),
                {
                  mode: "team",
                  sourceAgentId: "owner",
                  nextAgents: [],
                  applicationLookup: true,
                },
              ),
            );
          }
          patchAgentStatuses({ rhea: "active" });
          setTyping([]);
        }

        function submitTask(text, { seeded = false } = {}) {
          const trimmed = text.trim();
          if (!trimmed) {
            return;
          }

          const isExitMessage = EXIT_PATTERNS.test(trimmed);
          const activeTask = workspaceRef.current.activeTask;
          const isActiveDeliveryReply =
            !isExitMessage &&
            activeTask &&
            activeTask.deliveryMode &&
            ["awaiting_brief", "awaiting_approval"].includes(activeTask.workflowState);
          const appMemoryQuestion = !isExitMessage && !isActiveDeliveryReply && isApplicationMemoryQuestion(trimmed);
          const task = isExitMessage || isActiveDeliveryReply || appMemoryQuestion ? null : classifyTask(trimmed);

          setActiveChannel(TEAM_CHANNEL_ID);
          addMessage(
            TEAM_CHANNEL_ID,
            createOwnerMessage(TEAM_CHANNEL_ID, trimmed, {
              seeded,
              taskId: task ? task.id : activeTask && isActiveDeliveryReply ? activeTask.id : null,
              workflowReply: isActiveDeliveryReply,
            }),
          );
          setComposer("");
          setTaskModalOpen(false);

          if (isExitMessage) {
            enqueue(async () => {
              updateActiveTask(createReadySessionState());
              await wait(280);
              addMessage(
                TEAM_CHANNEL_ID,
                createAgentMessage(
                  TEAM_CHANNEL_ID,
                  "rhea",
                  `Room closed for now.\n\n- I have wrapped the live discussion.\n- The room is reset and ready whenever you want to bring the team back in on a new topic.\n\nWhen you are ready, drop the next requirement here and I will open the room again.`,
                  {
                    mode: "team",
                    sourceAgentId: "owner",
                    nextAgents: [],
                  },
                ),
              );
            });
            return;
          }

          if (isActiveDeliveryReply) {
            enqueue(() => handleActiveDeliveryInput(activeTask, trimmed));
            return;
          }

          if (appMemoryQuestion) {
            enqueue(() => answerApplicationMemoryQuestion(trimmed));
            return;
          }

          enqueue(() => runTaskWorkflow(task, trimmed));
        }

        function sendDm(ownerText, agentId) {
          const trimmed = ownerText.trim();
          if (!trimmed) {
            return;
          }

          const channelId = channelIdForAgent(agentId);
          addMessage(channelId, createOwnerMessage(channelId, trimmed, { dm: true, agentId }));
          setComposer("");

          if (shouldRouteThroughTeamRoom(trimmed)) {
            enqueue(async () => {
              await wait(260);
              addMessage(
                channelId,
                createAgentMessage(
                  channelId,
                  agentId,
                  `I am pulling Rhea into this so it turns into a real room-wide task instead of dying in a DM. I will keep my own context, but the execution should happen in #team-room.`,
                  { dm: true, rerouted: true },
                ),
              );
              await wait(420);
              const forwarded = `[Forwarded from ${AGENT_MAP[agentId].name} DM] ${trimmed}`;
              submitTask(forwarded);
            });
            return;
          }

          enqueue(async () => {
            await wait(520);
            await runAgentTurn({
              channelId,
              agentId,
              mode: "dm",
              task: workspaceRef.current.activeTask,
              ownerInput: trimmed,
              nextAgents: [],
              phaseLabel: "Private consultation",
              sourceAgentId: "owner",
              unreadOverride: false,
            });
          });
        }

        function handleComposerSend(event) {
          if (event) {
            event.preventDefault();
          }

          const draft = composerInputRef.current ? composerInputRef.current.value : composer;
          if (!draft || !draft.trim()) {
            if (composerInputRef.current) {
              composerInputRef.current.focus();
            }
            return;
          }

          if (workspace.activeChannelId === TEAM_CHANNEL_ID) {
            submitTask(draft);
            return;
          }
          const agentId = workspace.activeChannelId.replace("dm-", "");
          sendDm(draft, agentId);
        }

        function handleMentionJump(agentId) {
          setProfileAgentId(agentId);
          setActiveChannel(channelIdForAgent(agentId));
        }

        return (

                      </div>
                      <div className="brand-copy">
                        <p className="brand-kicker font-display text-xs uppercase tracking-[0.24em] text-signal-teal">ARIA</p>

                      </div>

                      Bring the requirement. Rhea turns it into team huddle, roadmap, diagram, build package, and release check.

                  <div className="channel-panel panel px-4 py-4">

                        workspace.activeChannelId === TEAM_CHANNEL_ID
                          ? "border-signal-teal/24 bg-signal-teal/10"
                          : "border-white/6 bg-white/[0.02] hover:border-white/12 hover:bg-white/[0.05]",
                      ].join(" ")}
                    >
                      <div className="channel-copy">
                        <p className="font-display text-sm font-semibold tracking-[0.08em] text-cloud-50"># team-room</p>
                        <p className="channel-preview mt-1 text-xs leading-5 text-cloud-200/64">{formatChannelPreview(teamMessages)}</p>

                    </div>
                    <div className="header-actions flex flex-wrap items-center gap-3">
                      <button
                        type="button"
                        disabled={!hasLiveTopic}
                        onClick={runStandup}
                        className={[
                          "toolbar-button secondary rounded-full border px-5 py-2.5 text-sm font-semibold transition",
                          hasLiveTopic ? "" : "is-disabled",
                          hasLiveTopic
                            ? "border-signal-amber/18 bg-signal-amber/10 text-signal-amber hover:border-signal-amber/36 hover:bg-signal-amber/14"
                            : "cursor-not-allowed border-white/10 bg-white/[0.04] text-cloud-200/38",
                        ].join(" ")}
                      >
                        Morning Standup
                      </button>
                      <button
                        type="button"
                        onClick={() => setTaskModalOpen(true)}
                        className="toolbar-button primary rounded-full bg-signal-teal px-5 py-2.5 text-sm font-semibold text-ink-950 transition hover:brightness-110"
                      >
                        + New Topic
                      </button>
                    </div>
                  </div>
                </div>

                <div className="room-stack flex min-h-0 flex-1 flex-col gap-4 px-4 py-4 md:px-8 md:py-6">
                  <section className="room-panel panel relative flex min-h-0 flex-1 flex-col overflow-hidden">
                    <div className="room-panel-top flex items-center justify-between border-b border-white/8 px-5 py-4">
                      <div className="subheader-copy">
                        <p className="subheader-eyebrow font-display text-xs uppercase tracking-[0.24em] text-cloud-200/48">
                          {activeChannelIsDm ? "Private channel" : "Facilitated room"}
                        </p>
                        <p className="subheader-body mt-2 text-sm leading-6 text-cloud-200/70">
                          {activeChannelIsDm
                            ? `Direct line with ${activeDmAgent.name}. Ask about decisions, tradeoffs, readiness, or route a task through them.`
                            : `Drop your requirement in plain language. Rhea will decide whether this needs a focused huddle or a full delivery track.`}
                        </p>
                      </div>
                      {activeChannelIsDm ? (
                        <button
                          type="button"
                          onClick={() => setProfileAgentId(activeDmAgent.id)}
                          className="toolbar-button rounded-full border border-white/12 bg-white/[0.04] px-4 py-2 text-xs font-semibold uppercase tracking-[0.18em] text-cloud-200/76 transition hover:border-white/22 hover:bg-white/[0.08]"
                        >
                          View profile
                        </button>
                      ) : (
                        <div className="avatar-strip hidden items-center gap-2 md:flex">
                          {AGENTS.map((agent) => (
                            <button key={agent.id} type="button" onClick={() => setProfileAgentId(agent.id)}>
                              <AgentAvatar agentId={agent.id} status={workspace.agentStatuses[agent.id]} size="sm" />
                            </button>
                          ))}
                        </div>
                      )}
                    </div>

                    <div ref={messageScrollerRef} className="messages-scroll min-h-0 flex-1 overflow-y-auto px-5 py-5 md:px-6">
                      {teamRoomIsEmpty ? (
                        <EmptyRoom bootSequence={bootSequence} onOpenProfile={setProfileAgentId} />
                      ) : activeMessages.length ? (
                        <div className="message-list space-y-5">
                          {activeMessages.map((message, index) => (
                            <MessageCard
                              key={message.id}
                              message={message}
                              previousMessage={index > 0 ? activeMessages[index - 1] : null}
                              onMentionClick={handleMentionJump}
                              onOpenProfile={setProfileAgentId}
                            />
                          ))}
                        </div>
                      ) : (
                        <div className="empty-state flex h-full items-center justify-center">
                          <div className="empty-copy max-w-xl text-center">
                            <p className="font-display text-xs uppercase tracking-[0.28em] text-cloud-200/40">Private line</p>
                            <h3 className="mt-4 font-display text-3xl font-semibold tracking-tight text-cloud-50">Start a one-on-one</h3>
                            <p className="mt-4 text-sm leading-7 text-cloud-200/72">
                              Ask why a decision was made, whether something is ready to ship, or hand an idea to this person and let them pull Rhea in.
                            </p>
                          </div>
                        </div>
                      )}
                    </div>
                  </section>

                  <TypingIndicator agentIds={workspace.typingAgents} onOpenProfile={setProfileAgentId} />

                  <section className="composer-panel panel px-4 py-4 md:px-5">
                    <form className="composer-layout flex flex-col gap-4 xl:flex-row xl:items-end" onSubmit={handleComposerSend}>
                      <div className="flex-1">
                        <label className="mb-2 block font-display text-xs uppercase tracking-[0.22em] text-cloud-200/48">
                          {activeChannelIsDm ? `Message ${activeDmAgent.name}` : "Tell the team what you need"}
                        </label>
                        {!activeChannelIsDm ? (
                          <div className="suggestion-row mb-3 flex flex-wrap gap-2">
                            {PARTY_SUGGESTIONS.map((suggestion) => (
                              <button
                                key={suggestion.label}
                                type="button"
                                onClick={() => setComposer(suggestion.prompt)}
                                className="suggestion-chip rounded-full border border-white/10 bg-white/[0.04] px-3 py-1.5 text-xs font-semibold text-cloud-200/76 transition hover:border-signal-teal/28 hover:bg-signal-teal/10 hover:text-cloud-50"
                              >
                                {suggestion.label}
                              </button>
                            ))}
                          </div>
                        ) : null}
                        <textarea
                          ref={composerInputRef}
                          value={composer}
                          onChange={(event) => setComposer(event.target.value)}
                          onKeyDown={(event) => {
                            if (event.key === "Enter" && !event.shiftKey) {
                              event.preventDefault();
                              handleComposerSend();
                            }
                          }}
                          placeholder={
                            activeChannelIsDm
                              ? `Ask ${activeDmAgent.name} anything, or drop a task and they will pull Rhea in.`
                              : "Bring the real requirement, bug, question, or goal. Rhea will pull the right people into the room."
                          }
                          className="field-input min-h-[126px] w-full rounded-[26px] border border-white/10 bg-ink-950/70 px-5 py-4 text-base leading-7 text-cloud-50 outline-none transition placeholder:text-cloud-200/32 focus:border-signal-teal/40 focus:ring-2 focus:ring-signal-teal/18"
                        />
                      </div>
                      <div className="composer-side flex w-full flex-col gap-3 xl:w-[280px]">
                        <div className="round-card rounded-[24px] border border-white/8 bg-white/[0.03] px-4 py-4">
                          <p className="label-mono font-mono text-[10px] uppercase tracking-[0.18em] text-cloud-200/42">Current round</p>
                          <p className="topic-copy mt-2 text-sm leading-6 text-cloud-50">
                            {workspace.activeTask.ownerIds.map((agentId) => AGENT_MAP[agentId].name).join(" + ")}
                          </p>
                          <p className="topic-copy muted mt-2 text-sm leading-6 text-cloud-200/70">{workspace.activeTask.stage}</p>
                        </div>
                        <button
                          type="submit"
                          className="toolbar-button primary rounded-full bg-signal-teal px-5 py-3 text-sm font-semibold text-ink-950 transition hover:brightness-110"
                        >
                          {activeChannelIsDm ? "Send message" : "Send to room"}
                        </button>
                      </div>
                    </form>
                  </section>
                </div>
              </main>
            </div>

            <AgentProfileCard agentId={profileAgentId} workspace={workspace} onClose={() => setProfileAgentId(null)} />
            {taskModalOpen ? <TaskModal initialValue="" onClose={() => setTaskModalOpen(false)} onSubmit={(value) => submitTask(value)} /> : null}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("app")).render(<App />);
    </script>
  </body>
</html>
